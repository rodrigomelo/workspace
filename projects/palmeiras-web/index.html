<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Dashboard</title>
    <style>
        :root {
            --palmeiras-green: #007824;
            --palmeiras-dark-green: #005c1a;
            --palmeiras-white: #ffffff;
            --palmeiras-cream: #f5f5dc;
            --bg-dark: #1a1a1a;
            --bg-card: #2d2d2d;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--palmeiras-green), var(--palmeiras-dark-green));
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 120, 36, 0.4);
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--palmeiras-white);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header .subtitle {
            color: var(--palmeiras-cream);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 8px;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(0, 120, 36, 0.2);
        }

        .tab-btn.active {
            background: var(--palmeiras-green);
            border-color: var(--palmeiras-green);
        }

        .competition-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .comp-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .comp-btn:hover {
            border-color: var(--palmeiras-green);
            color: var(--text-light);
        }

        .comp-btn.active {
            background: var(--palmeiras-green);
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            color: var(--palmeiras-green);
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--palmeiras-green);
            border-radius: 2px;
        }

        /* Next Matches List */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .match-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--palmeiras-green);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .match-date-time {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .match-competition {
            font-size: 0.75rem;
            background: var(--palmeiras-green);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-size: 1rem;
            font-weight: bold;
        }

        .team.palmeiras .team-name {
            color: var(--palmeiras-green);
        }

        .vs {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: bold;
            padding: 0 0.5rem;
        }

        /* Recent Results */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--palmeiras-green);
        }

        .result-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            width: 60px;
        }

        .result-teams {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .result-score {
            font-size: 1.1rem;
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }

        .win { color: #4ade80; }
        .draw { color: #fbbf24; }
        .loss { color: #f87171; }

        /* Standings */
        .standings-info {
            text-align: center;
        }

        .position {
            font-size: 3rem;
            font-weight: bold;
            color: var(--palmeiras-green);
        }

        .position-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .competition-name {
            font-size: 1.1rem;
            color: var(--palmeiras-cream);
            margin-bottom: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat {
            text-align: center;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--palmeiras-green);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--palmeiras-green);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 1rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                justify-content: center;
            }
            
            .tab-btn {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏆 Palmeiras</h1>
        <p class="subtitle">Dashboard de Jogos e Classificação</p>
    </header>

    <main class="container">
        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="proximos">Próximos Jogos</button>
            <button class="tab-btn" data-tab="resultados">Resultados</button>
            <button class="tab-btn" data-tab="classificacao">Classificação</button>
        </div>

        <!-- Próximos Jogos Tab -->
        <div id="proximos" class="tab-content active">
            <div class="grid">
                <div class="card" style="grid-column: 1 / -1;">
                    <h2 class="card-title">Próximos 5 Jogos</h2>
                    <div id="next-matches">
                        <div class="loading">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resultados Tab -->
        <div id="resultados" class="tab-content">
            <div class="grid">
                <div class="card" style="grid-column: 1 / -1;">
                    <h2 class="card-title">Últimos Resultados</h2>
                    <div id="recent-results">
                        <div class="loading">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Classificação Tab -->
        <div id="classificacao" class="tab-content">
            <div class="competition-tabs">
                <button class="comp-btn active" data-comp="BSA">Brasileirão</button>
                <button class="comp-btn" data-comp="CLI">Libertadores</button>
            </div>
            <div class="grid">
                <div class="card" style="grid-column: 1 / -1;">
                    <h2 class="card-title">Classificação</h2>
                    <div id="standings">
                        <div class="loading">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Dados fornecidos por Football-Data.org</p>
    </footer>

    <script>
        // Local API base (server proxies requests to football-data.org)
        const API_BASE = '/api';
        const TEAM_ID = 1769;
        
        // Brazilian timezone (UTC-3)
        const BR_TZ = 'America/Sao_Paulo';

        // Format date to Brazilian Portuguese
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', { 
                day: '2-digit', 
                month: '2-digit',
                year: 'numeric',
                timeZone: BR_TZ
            });
        }

        // Format time to Brazilian Portuguese
        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleTimeString('pt-BR', { 
                hour: '2-digit', 
                minute: '2-digit',
                timeZone: BR_TZ
            });
        }

        // Format competition name
        function formatCompetition(comp) {
            const names = {
                'BSA': 'Brasileirão',
                'COPA_DO_BRASIL': 'Copa do Brasil',
                'LIBERTADORES': 'Libertadores',
                'RECOPA': 'Recopa',
                'PAULISTA': 'Campeonato Paulista',
                'BRA': 'Brasileirão'
            };
            return names[comp] || comp;
        }

        // Get competition code
        function getCompetitionCode(comp) {
            if (comp === 'SERIE_A' || comp?.code === 'BSA' || comp?.code === 'BRA') return 'BSA';
            if (comp?.code === 'LIBERTADORES') return 'LIB';
            return comp?.code || comp || 'BSA';
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active tab button
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Show corresponding content
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabId).classList.add('active');
            });
        });

        // Competition switching
        let currentCompetition = 'BSA';
        document.querySelectorAll('.comp-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCompetition = btn.dataset.comp;
                loadStandings(currentCompetition);
            });
        });

        // Load next 5 matches
        async function loadNextMatches() {
            const container = document.getElementById('next-matches');
            
            try {
                const response = await fetch(
                    `${API_BASE}/teams/${TEAM_ID}/matches?status=SCHEDULED&limit=5`
                );
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                const matches = data.matches || [];
                
                if (matches.length === 0) {
                    container.innerHTML = '<div class="no-data">Nenhum jogo agendado no momento</div>';
                    return;
                }

                const matchesHTML = matches.map(match => {
                    const homeTeam = match.homeTeam;
                    const awayTeam = match.awayTeam;
                    const isHome = homeTeam.id === TEAM_ID;
                    const compCode = getCompetitionCode(match.competition);

                    return `
                        <div class="match-item">
                            <div class="match-header">
                                <span class="match-date-time">
                                    ${formatDate(match.utcDate)} às ${formatTime(match.utcDate)}
                                </span>
                                <span class="match-competition">${formatCompetition(compCode)}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team ${isHome ? 'palmeiras' : ''}">
                                    <div class="team-name">${homeTeam.name}</div>
                                </div>
                                <span class="vs">X</span>
                                <div class="team ${!isHome ? 'palmeiras' : ''}">
                                    <div class="team-name">${awayTeam.name}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `<div class="matches-list">${matchesHTML}</div>`;
            } catch (error) {
                container.innerHTML = '<div class="no-data">Erro ao carregar próximos jogos</div>';
                console.error(error);
            }
        }

        // Load recent results
        async function loadRecentResults() {
            const container = document.getElementById('recent-results');
            
            try {
                const response = await fetch(
                    `${API_BASE}/teams/${TEAM_ID}/matches?status=FINISHED&limit=5`
                );
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                const matches = data.matches || [];
                
                if (matches.length === 0) {
                    container.innerHTML = '<div class="no-data">Nenhum resultado encontrado</div>';
                    return;
                }

                const resultsHTML = matches.map(match => {
                    const homeTeam = match.homeTeam;
                    const awayTeam = match.awayTeam;
                    const scoreHome = match.score.fullTime.home ?? 0;
                    const scoreAway = match.score.fullTime.away ?? 0;
                    
                    const isPalmeirasHome = homeTeam.id === TEAM_ID;
                    const palmeirasScore = isPalmeirasHome ? scoreHome : scoreAway;
                    const opponentScore = isPalmeirasHome ? scoreAway : scoreHome;
                    const opponentName = isPalmeirasHome ? awayTeam.name : homeTeam.name;
                    
                    let resultClass = 'draw';
                    if (palmeirasScore > opponentScore) resultClass = 'win';
                    else if (palmeirasScore < opponentScore) resultClass = 'loss';

                    return `
                        <div class="result-item">
                            <span class="result-date">${formatDate(match.utcDate)}</span>
                            <span class="result-teams">${opponentName}</span>
                            <span class="result-score ${resultClass}">${scoreHome} - ${scoreAway}</span>
                        </div>
                    `;
                }).join('');

                container.innerHTML = `<div class="results-list">${resultsHTML}</div>`;
            } catch (error) {
                container.innerHTML = '<div class="no-data">Erro ao carregar resultados</div>';
                console.error(error);
            }
        }

        // Load standings
        async function loadStandings(competition = 'BSA') {
            const container = document.getElementById('standings');
            container.innerHTML = '<div class="loading">Carregando...</div>';
            
            try {
                const response = await fetch(
                    `${API_BASE}/competitions/${competition}/standings`
                );
                
                if (!response.ok) {
                    // Check if it's a 404 - competition might not have standings
                    if (response.status === 404) {
                        const compName = competition === 'CLI' ? 'Libertadores' : 'Brasileirão';
                        container.innerHTML = `<div class="no-data">Classificação não disponível para ${compName}<br><small>(Apenas competições de liga têm tabela)</small></div>`;
                        return;
                    }
                    throw new Error('API error');
                }
                
                const data = await response.json();
                const standings = data.standings || [];
                
                if (standings.length === 0) {
                    container.innerHTML = '<div class="no-data">Nenhum dado de classificação disponível</div>';
                    return;
                }

                // Find Palmeirense position in TOTAL table
                let position = null;
                let played = 0;
                let points = 0;
                let wins = 0;

                for (const standing of standings) {
                    if (standing.type === 'TOTAL') {
                        for (let i = 0; i < standing.table.length; i++) {
                            const team = standing.table[i];
                            if (team.team.id === TEAM_ID) {
                                position = i + 1;
                                played = team.playedGames;
                                points = team.points;
                                wins = team.won;
                                break;
                            }
                        }
                        break;
                    }
                }

                if (position === null) {
                    container.innerHTML = '<div class="no-data">Palmeiras não encontrado na tabela</div>';
                    return;
                }

                const compName = competition === 'CLI' ? 'Libertadores' : 'Brasileirão';

                container.innerHTML = `
                    <div class="standings-info">
                        <div class="competition-name">${compName}</div>
                        <div class="position">${position}º</div>
                        <div class="position-label">Lugar no Campeonato</div>
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-value">${played}</div>
                                <div class="stat-label">Jogos</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${points}</div>
                                <div class="stat-label">Pontos</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${wins}</div>
                                <div class="stat-label">Vitórias</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<div class="no-data">Erro ao carregar classificação</div>';
                console.error(error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadNextMatches();
            loadRecentResults();
            loadStandings(currentCompetition);
        });
    </script>
</body>
</html>
