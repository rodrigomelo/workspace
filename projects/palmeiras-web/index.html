<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmeiras - Dashboard</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --text: #1A1A1A;
            --text-secondary: #666666;
            --palmeiras-green: #0D7A3D;
            --palmeiras-light: #E8F5E9;
            --accent: #FFD700;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--bg);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 3px solid var(--palmeiras-green);
        }

        .header h1 {
            font-size: 2rem;
            color: var(--palmeiras-green);
            font-weight: 700;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--palmeiras-light);
            color: var(--palmeiras-green);
        }

        .tab-btn.active {
            background: var(--palmeiras-green);
            color: white;
        }

        .comp-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid #ddd;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .comp-btn:hover {
            background: var(--palmeiras-light);
            color: var(--palmeiras-green);
        }

        .comp-btn.active {
            background: var(--palmeiras-green);
            color: white;
            border-color: var(--palmeiras-green);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards */
        .card {
            background: var(--bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            border: 1px solid #eee;
        }

        .card-title {
            color: var(--palmeiras-green);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Hero */
        .hero-card {
            background: linear-gradient(135deg, var(--palmeiras-green), #0a5a2d);
            border-radius: 16px;
            padding: 2rem;
            color: white;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .hero-comp {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .hero-teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
        }

        .hero-team {
            flex: 1;
            text-align: center;
        }

        .hero-team-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .hero-vs {
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0.8;
        }

        .hero-date {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* Info bar */
        .info-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-card {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .info-icon { font-size: 1.3rem; }
        .info-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .info-value { font-size: 0.95rem; font-weight: 500; }

        /* Matches */
        .match-item {
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--palmeiras-green);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
        }

        /* Standings */
        .standings-info {
            text-align: center;
            padding: 1rem;
        }

        .position-badge {
            display: inline-block;
            background: var(--palmeiras-green);
            color: white;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-box {
            text-align: center;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--palmeiras-green);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--palmeiras-green);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .container { padding: 1rem; }
            .hero-teams { flex-direction: column; gap: 0.5rem; }
            .info-bar { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏆 Palmeiras</h1>
    </header>

    <main class="container">
        <!-- Hero -->
        <div class="hero-card" id="hero-match">
            <div class="loading" style="color:white">Carregando...</div>
        </div>

        <!-- Info Bar -->
        <div class="info-bar">
            <div class="info-card">
                <span class="info-icon">📺</span>
                <div>
                    <div class="info-label">Onde Assistir</div>
                    <div class="info-value" id="where-watch">Globo, Premiere</div>
                </div>
            </div>
            <div class="info-card">
                <span class="info-icon">📍</span>
                <div>
                    <div class="info-label">Estádio</div>
                    <div class="info-value" id="stadium-info">Allianz Parque</div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="proximos">Próximos</button>
            <button class="tab-btn" data-tab="resultados">Resultados</button>
            <button class="tab-btn" data-tab="classificacao">Classificação</button>
        </div>

        <div id="proximos" class="tab-content active">
            <div class="card">
                <div class="card-title">Próximos 5 Jogos</div>
                <div id="next-matches"><div class="loading">Carregando...</div></div>
            </div>
        </div>

        <div id="resultados" class="tab-content">
            <div class="card">
                <div class="card-title">Resultados Recentes</div>
                <div id="recent-results"><div class="loading">Carregando...</div></div>
            </div>
        </div>

        <div id="classificacao" class="tab-content">
            <div class="card">
                <div class="card-title">Classificação</div>
                <div class="tabs" style="margin-bottom: 1rem;">
                    <button class="comp-btn active" data-comp="BSA">Brasileirão</button>
                    <button class="comp-btn" data-comp="LIB">Libertadores</button>
                    <button class="comp-btn" data-comp="CDB">Copa do Brasil</button>
                </div>
                <div id="standings"><div class="loading">Carregando...</div></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Dados: football-data.org • ge.globo</p>
    </footer>

    <script>
        const API_BASE = '/api';
        const TEAM_ID = 1769;
        const BR_TZ = 'America/Sao_Paulo';

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('pt-BR', { 
                day: '2-digit', month: '2-digit', timeZone: BR_TZ 
            });
        }

        function formatTime(dateStr) {
            return new Date(dateStr).toLocaleTimeString('pt-BR', { 
                hour: '2-digit', minute: '2-digit', timeZone: BR_TZ 
            });
        }

        function formatCompetition(comp) {
            const names = { 'BSA': 'Brasileirão', 'COPA_DO_BRASIL': 'Copa do Brasil', 'LIBERTADORES': 'Libertadores' };
            return names[comp?.code] || comp?.name || 'Campeonato';
        }

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Load hero
        async function loadHero() {
            const container = document.getElementById('hero-match');
            try {
                const res = await fetch(`${API_BASE}/teams/${TEAM_ID}/matches?status=SCHEDULED&limit=1`);
                const data = await res.json();
                const match = data.matches?.[0];
                if (!match) { container.innerHTML = '<div class="loading" style="color:white">Nenhum jogo agendado</div>'; return; }

                const home = match.homeTeam, away = match.awayTeam;
                const isHome = home.id === TEAM_ID;
                const comp = formatCompetition(match.competition);

                document.getElementById('where-watch').textContent = isHome ? 'Globo, Premiere' : 'Globo';
                document.getElementById('stadium-info').textContent = isHome ? 'Allianz Parque' : 'Fora';

                container.innerHTML = `
                    <div class="hero-comp">${comp}</div>
                    <div class="hero-teams">
                        <div class="hero-team"><div class="hero-team-name">${home.name}</div></div>
                        <div class="hero-vs">X</div>
                        <div class="hero-team"><div class="hero-team-name">${away.name}</div></div>
                    </div>
                    <div class="hero-date">${formatDate(match.utcDate)} • ${formatTime(match.utcDate)}</div>
                `;
            } catch (e) {
                container.innerHTML = '<div class="loading" style="color:white">Erro</div>';
            }
        }

        // Load matches
        async function loadMatches() {
            const container = document.getElementById('next-matches');
            try {
                const res = await fetch(`${API_BASE}/teams/${TEAM_ID}/matches?status=SCHEDULED&limit=5`);
                const data = await res.json();
                const matches = data.matches || [];
                if (!matches.length) { container.innerHTML = '<div class="loading">Nenhum jogo</div>'; return; }
                container.innerHTML = matches.map(m => `
                    <div class="match-item">
                        <div class="match-header">
                            <span>${formatDate(m.utcDate)} • ${formatTime(m.utcDate)}</span>
                            <span>${formatCompetition(m.competition)}</span>
                        </div>
                        <div class="match-teams">
                            <span>${m.homeTeam.name}</span>
                            <span style="color:var(--text-secondary)">X</span>
                            <span>${m.awayTeam.name}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = '<div class="loading">Erro</div>'; }
        }

        // Load results
        async function loadResults() {
            const container = document.getElementById('recent-results');
            try {
                const res = await fetch(`${API_BASE}/teams/${TEAM_ID}/matches?status=FINISHED&limit=5`);
                const data = await res.json();
                const matches = data.matches || [];
                if (!matches.length) { container.innerHTML = '<div class="loading">Nenhum resultado</div>'; return; }
                container.innerHTML = matches.map(m => {
                    const isHome = m.homeTeam.id === TEAM_ID;
                    const ourScore = isHome ? m.score.fullTime.home : m.score.fullTime.away;
                    const oppScore = isHome ? m.score.fullTime.away : m.score.fullTime.home;
                    const oppName = isHome ? m.awayTeam.name : m.homeTeam.name;
                    const result = ourScore > oppScore ? '✅' : ourScore < oppScore ? '❌' : '➖';
                    return `
                        <div class="match-item">
                            <div class="match-header"><span>${formatDate(m.utcDate)}</span><span>${formatCompetition(m.competition)}</span></div>
                            <div class="match-teams"><span>${oppName}</span><span>${ourScore} - ${oppScore} ${result}</span></div>
                        </div>
                    `;
                }).join('');
            } catch (e) { container.innerHTML = '<div class="loading">Erro</div>'; }
        }

        let currentCompetition = 'BSA';

        // Competition buttons
        document.querySelectorAll('.comp-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCompetition = btn.dataset.comp;
                loadStandings(currentCompetition);
            });
        });

        // Load standings
        async function loadStandings(comp) {
            const container = document.getElementById('standings');
            const competition = comp || currentCompetition;
            const compNames = { 'BSA': 'Brasileirão', 'LIB': 'Copa Libertadores', 'CDB': 'Copa do Brasil' };
            
            container.innerHTML = '<div class="loading">Carregando...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/competitions/${competition}/standings`);
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Competition not available');
                }
                const data = await res.json();
                let pos = null, pts = 0, p = 0, w = 0, g = 0, d = 0;
                for (const s of data.standings || []) {
                    if (s.type === 'TOTAL') {
                        for (let i = 0; i < s.table.length; i++) {
                            if (s.table[i].team.id === TEAM_ID) { 
                                pos = i + 1; 
                                pts = s.table[i].points; 
                                p = s.table[i].playedGames; 
                                w = s.table[i].won;
                                g = s.table[i].goalsFor;
                                d = s.table[i].goalsAgainst;
                                break; 
                            }
                        }
                        break;
                    }
                }
                if (!pos) { 
                    container.innerHTML = '<div class="loading">Palmeiras não está nesta competição</div>'; 
                    return; 
                }
                container.innerHTML = `
                    <div class="standings-info">
                        <div style="margin-bottom:0.5rem;color:var(--text-secondary);font-size:0.9rem">${compNames[competition] || competition}</div>
                        <div class="position-badge">${pos}º</div>
                        <div class="stats-grid">
                            <div class="stat-box"><div class="stat-value">${pts}</div><div class="stat-label">Pontos</div></div>
                            <div class="stat-box"><div class="stat-value">${p}</div><div class="stat-label">Jogos</div></div>
                            <div class="stat-box"><div class="stat-value">${w}</div><div class="stat-label">Vitórias</div></div>
                        </div>
                        <div class="stats-grid" style="margin-top:0.5rem">
                            <div class="stat-box"><div class="stat-value">${g}</div><div class="stat-label">Gols Pró</div></div>
                            <div class="stat-box"><div class="stat-value">${d}</div><div class="stat-label">Gols Contra</div></div>
                            <div class="stat-box"><div class="stat-value">${g - d}</div><div class="stat-label">Saldo</div></div>
                        </div>
                    </div>
                `;
            } catch (e) { 
                container.innerHTML = `<div class="loading" style="color:#c0392b">❌ ${e.message || 'Erro ao carregar classificação'}</div>`; 
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHero();
            loadMatches();
            loadResults();
            loadStandings();
        });
    </script>
</body>
</html>
